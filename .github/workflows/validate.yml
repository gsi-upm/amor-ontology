name: Validate RDF release

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.0"
          enable-cache: true
      - name: Run offline RDF validation
        run: UV_CACHE_DIR=/tmp/uv-cache uv run --frozen pytest -q
